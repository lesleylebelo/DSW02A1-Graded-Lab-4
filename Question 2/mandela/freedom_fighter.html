<!DOCTYPE html>
<html>
    <head>
        <meta charset = "UTF-8">
        <meta name = "viewpoint" content = "width = device-width, initial-scale = 1.0">
        <title>Graded Lab 4</title>
        <script src = "freedom_fighter.js"></script>
        <link rel = "stylesheet" href = "freedom_fighter.css">
    </head>
    <body>

        <h1>Nelson Mandela Freedom Fighter Pics</h1>

  <div id="counter">Images remaining: <span id="remaining-count">6</span></div>

  <h2>Freedom Fighter Pics</h2>

  <div id="pics">

    <div class="pic-wrapper" id="wrapper-1">
      <img src="mandel1.jpg" alt="Picture of a young Mandela" id="img-1" title="Mandela as a young man">
      <div class="pic-label">1</div>
    </div>

    <div class="pic-wrapper" id="wrapper-2">
      <img src="mandela2.jpg" alt="Mandela smiling" id="img-2" title="Mandela smiling">
      <div class="pic-label">2</div>
    </div>

    <div class="pic-wrapper" id="wrapper-3">
      <img src="mandela3.jpg" alt="Mandela speaking" id="img-3" title="Mandela speaking">
      <div class="pic-label">3</div>
    </div>

    <div class="pic-wrapper" id="wrapper-4">
      <img src="mandela4.webp" alt="Mandela in formal attire" id="img-4" title="Mandela in formal attire">
      <div class="pic-label">4</div>
    </div>

    <div class="pic-wrapper" id="wrapper-5">
      <img src="mandela5.jpg" alt="Mandela raising fist" id="img-5" title="Mandela raising fist">
      <div class="pic-label">5</div>
    </div>
    
    <div class="pic-wrapper" id="wrapper-6">
      <img src="mandela6.jpg" alt="Mandela elder statesman" id="img-6" title="Mandela elder statesman">
      <div class="pic-label">6</div>
    </div>

  </div>

  <h2>Favourites</h2>
  <div id="favourites"></div>

  <div id="confirmation"></div>

  <h2>Actions</h2>
  <ul id="actions"></ul>

    </body>
</html>
